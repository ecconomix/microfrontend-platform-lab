name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm -r build

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        app:
          - shell
          - dashboard
          - settings

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f Dockerfile.prod \
            --build-arg APP_NAME=${{ matrix.app }} \
            -t microfrontend-platform-lab-${{ matrix.app }}:ci \
            .

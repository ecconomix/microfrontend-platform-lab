server {
    listen 80;
    server_name microfrontend-platform-lab.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name microfrontend-platform-lab.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/microfrontend-platform-lab.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/microfrontend-platform-lab.duckdns.org/privkey.pem;

    location /dashboard/ {
        proxy_pass http://dashboard:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /settings/ {
        proxy_pass http://settings:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://shell:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
